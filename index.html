<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Esküvői vendégfotók</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    padding: 2rem;
    box-sizing: border-box;
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #faf7f2;
    color: #333;
  }
  h1 {
    font-size: 1.6rem;
    font-weight: 600;
    margin: 0;
  }
  p {
    margin: 0;
    max-width: 22rem;
    line-height: 1.5;
    color: #666;
  }
  .btn {
    display: inline-block;
    padding: 1rem 2rem;
    font-size: 1.2rem;
    font-weight: 600;
    color: #fff;
    background: #4285f4;
    border-radius: 999px;
    text-decoration: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .btn:active {
    background: #3367d6;
  }
</style>
</head>
<body>

<p>Kattints a gombra, hogy megnyisd a mappát, és feltöltsd a saját fotóidat.</p>
